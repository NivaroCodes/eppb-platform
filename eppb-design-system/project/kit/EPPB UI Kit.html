<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>EPPB · UI Kit</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-0); color: var(--fg-1); font-family: var(--font-body); }
  * { box-sizing: border-box; }

  /* Shared screen chrome */
  .screen { width: 100%; height: 100%; background: var(--bg-1); color: var(--fg-1); font-family: var(--font-body); display: flex; flex-direction: column; overflow: hidden; }
  .mono { font-family: var(--font-mono); }
  .display { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }
  .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.10em; color: var(--fg-3); }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: 14px; border: 1px solid transparent; cursor: pointer; line-height: 1; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost { background: var(--bg-3); color: var(--fg-1); border-color: var(--line-2); }
  .btn-quiet { background: transparent; color: var(--fg-2); }
  .arr { font-family: var(--font-mono); font-size: 13px; }

  /* Admin sidebar */
  .sb { width: 240px; background: var(--bg-2); border-right: 1px solid var(--line-2); display: flex; flex-direction: column; flex-shrink: 0; }
  .sb-head { padding: 22px 22px 18px; border-bottom: 1px solid var(--line-1); }
  .sb-brand { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
  .sb-brand::before { content: ""; width: 8px; height: 8px; background: var(--accent); display: inline-block; }
  .sb-sub { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--fg-3); margin-top: 8px; }
  .sb-section { padding: 18px 14px 6px; }
  .sb-section .label { padding: 0 8px 6px; }
  .sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; font-size: 13px; color: var(--fg-2); cursor: pointer; }
  .sb-item:hover { background: var(--bg-3); color: var(--fg-1); }
  .sb-item.active { background: var(--accent-soft); color: var(--accent); }
  .sb-item .dot { width: 14px; height: 14px; border: 1.5px solid currentColor; border-radius: 3px; opacity: .7; }
  .sb-foot { margin-top: auto; padding: 14px; border-top: 1px solid var(--line-1); }

  /* Topbar */
  .top { height: 52px; border-bottom: 1px solid var(--line-2); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; background: var(--bg-1); }
  .crumb { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.10em; color: var(--fg-3); }
  .crumb .sep { color: var(--fg-5); }
  .crumb .cur { color: var(--fg-1); }
  .top-right { display: flex; align-items: center; gap: 12px; }
  .pill { padding: 4px 10px; border-radius: 9999px; border: 1px solid var(--line-2); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; color: var(--fg-2); display: inline-flex; align-items: center; gap: 6px; }
  .pill .gd { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

  /* Content area */
  .content { flex: 1; overflow: auto; padding: 28px 32px; }

  /* Cards */
  .panel { background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 12px; }
  .panel-pad { padding: 20px 22px; }

  /* Inputs */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-lab { font-size: 12px; font-weight: 500; color: var(--fg-2); }
  .field-help { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
  .inp { background: var(--bg-3); border: 1px solid var(--line-2); border-radius: 8px; padding: 11px 14px; font-family: var(--font-body); font-size: 14px; color: var(--fg-1); outline: 0; width: 100%; }
  .inp::placeholder { color: var(--fg-4); }
  .inp.focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .inp.success { border-color: var(--success-line); background: var(--success-soft); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 4px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid; }
  .b-active { background: var(--success-soft); border-color: var(--success-line); color: var(--success); }
  .b-draft { background: var(--bg-3); border-color: var(--line-2); color: var(--fg-3); }
  .badge .d { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Wizard step rail */
  .stepbar { height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
  .stepbar > div { height: 100%; background: var(--accent); }
  .pulse { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.10em; }
  .pulse::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: p 1.6s var(--ease-out) infinite; }
  @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(232,75,15,.5); } 70% { box-shadow: 0 0 0 8px rgba(232,75,15,0); } 100% { box-shadow: 0 0 0 0 rgba(232,75,15,0); } }

  /* Tables */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em; color: var(--fg-3); font-weight: 500; padding: 10px 16px; background: var(--bg-2); border-bottom: 1px solid var(--line-2); }
  td { padding: 14px 16px; border-bottom: 1px solid var(--line-1); font-size: 13px; color: var(--fg-2); }
  tr:hover td { background: var(--bg-2); }
  td.title { color: var(--fg-1); font-weight: 500; }
</style>
</head>
<body>

<!-- 01 LOGIN -->
<template id="screen-login">
<div class="screen" style="flex-direction: row;">
  <!-- Left: identity wall -->
  <div style="flex: 1; padding: 56px 64px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 60%, #1A0A05 100%); border-right: 1px solid var(--line-2);">
    <div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 12px; height: 12px; background: var(--accent);"></div>
        <div class="display" style="font-size: 22px;">ЕППБ</div>
        <div class="label" style="margin: 0;">/ БАЙТЕРЕК</div>
      </div>
      <div class="display" style="font-size: 56px; line-height: 1; margin-top: 64px; max-width: 12ch;">Единый портал поддержки бизнеса.</div>
      <div style="font-size: 15px; color: var(--fg-2); margin-top: 24px; max-width: 44ch; line-height: 1.6;">70+ мер поддержки в одном реестре. Подача, маршрутизация, статус — без переключения порталов.</div>
    </div>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 540px;">
      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="num display" style="font-size: 28px;">70+</div><div class="label" style="margin-top: 4px;">мер поддержки</div></div>
      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="num display" style="font-size: 28px;">v2.0</div><div class="label" style="margin-top: 4px;">JSON contract</div></div>
      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="num display" style="font-size: 28px;">60s</div><div class="label" style="margin-top: 4px;">time-to-publish</div></div>
    </div>
  </div>
  <!-- Right: form -->

    <div class="display" style="font-size: 32px; margin-top: 12px;">Войти в платформу</div>
    <!-- tabs -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; padding: 4px; background: var(--bg-3); border-radius: 8px; margin-top: 28px;">
      <div style="padding: 8px 12px; background: var(--bg-1); color: var(--fg-1); border-radius: 6px; font-size: 13px; font-weight: 600; text-align: center;">Администратор</div>
      <div style="padding: 8px 12px; color: var(--fg-3); font-size: 13px; font-weight: 500; text-align: center;">Предприниматель</div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 24px;">
      <div class="field"><div class="field-lab">Логин</div><input class="inp" value="admin@baiterek.kz"></div>
      <div class="field"><div class="field-lab">Пароль</div><input class="inp focus" type="password" value="••••••••"></div>
      <button class="btn btn-primary" style="justify-content: center; margin-top: 4px; padding: 12px;">Войти <span class="arr">→</span></button>
    </div>
    <div class="label" style="margin-top: 28px; display: flex; gap: 8px;"><span>SSO</span><span style="color: var(--fg-5)">·</span><span>EGOV</span><span style="color: var(--fg-5)">·</span><span style="color: var(--accent)">↗ ПОМОЩЬ</span></div>
  </div>
</div>
</template>

<!-- 02 PORTAL CATALOG -->
<template id="screen-portal">
<div class="screen">
  <!-- public header -->
  <div class="top" style="height: 60px;">
    <div style="display: flex; align-items: center; gap: 28px;">
      <div class="display" style="font-size: 17px; display: flex; align-items: center; gap: 8px;"><span style="width: 7px; height: 7px; background: var(--accent);"></span>ЕППБ <span class="label" style="margin: 0;">/ БАЙТЕРЕК</span></div>
      <div style="display: flex; gap: 4px;">
        <div style="padding: 6px 12px; border-radius: 6px; font-size: 13px; color: var(--accent); background: var(--accent-soft); font-weight: 500;">Услуги</div>

    <div style="display: flex; gap: 16px; margin-top: 28px; align-items: center;">
      <div style="position: relative; flex: 1; max-width: 540px;">

        <div style="padding: 8px 12px; font-size: 12px; background: var(--bg-3); border-radius: 6px; color: var(--fg-1); font-weight: 500;">Все · 24</div>
        <div style="padding: 8px 12px; font-size: 12px; color: var(--fg-3);">Лизинг · 6</div>
        <div style="padding: 8px 12px; font-size: 12px; color: var(--fg-3);">Гранты · 8</div>

  <div class="content" style="padding: 28px 48px;">

        <div class="display" style="font-size: 20px;">Лизинг авиатранспорта и&nbsp;вагонов</div>
        <div style="font-size: 13px; color: var(--fg-3); line-height: 1.5;">Автозаполнение через eGov, ветвление по форме собственности, расчёт НДС на лету.</div>
        <div style="display: flex; gap: 6px; flex-wrap: wrap;">
          <div class="badge b-draft">eGov</div>
          <div class="badge b-draft">credit-registry</div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--line-1); margin-top: auto;">
          <div class="label" style="margin: 0;">4 шага · v2.0.0</div>

        </div>
      </div>
      <!-- card 3 -->
      <div class="panel panel-pad" style="padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; min-height: 220px;">
        <div class="label">SERVICE · # guarantee-sme</div>

        <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--line-1); margin-top: auto;">
          <div class="label" style="margin: 0;">5 шагов · v2.1.0</div>
          <div class="label" style="margin: 0; color: var(--fg-3);">Подробнее →</div>
        </div>

<!-- 03 SERVICE DETAIL -->
<template id="screen-detail">
<div class="screen">
  <div class="top" style="height: 60px;">
    <div class="crumb"><span>ЕППБ</span><span class="sep">/</span><span>УСЛУГИ</span><span class="sep">/</span><span class="cur">ЛИЗИНГ АВИАТРАНСПОРТА И ВАГОНОВ</span></div>
    <div class="top-right"><div class="pill"><span class="gd"></span>BIN 123456789012</div></div>
  </div>
  <div class="content" style="padding: 32px 48px;">
    <!-- hero -->
    <div class="panel" style="padding: 32px 36px; display: flex; gap: 32px; align-items: flex-start;">
      <div style="flex: 1;">
        <div class="label">SERVICE · # leasing-aviation-wagons-stage1 · v2.0.0</div>
        <div class="display" style="font-size: 36px; line-height: 1.05; margin-top: 12px; max-width: 22ch;">Приобретение авиатранспорта и&nbsp;вагонов в лизинг — I этап</div>

      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="label">ИНТЕГРАЦИЙ</div><div class="num display" style="font-size: 28px; margin-top: 4px;">02</div><div class="label" style="margin-top: 4px; text-transform: none; letter-spacing: 0;">eGov · credit-registry</div></div>
      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="label">СРЕДНЕЕ ВРЕМЯ</div><div class="num display" style="font-size: 28px; margin-top: 4px;">12<span style="font-size: 16px; color: var(--fg-3); margin-left: 4px;">мин</span></div></div>
      <div class="panel panel-pad" style="padding: 16px 18px;"><div class="label">ВЕРСИЯ СХЕМЫ</div><div class="num display" style="font-size: 28px; margin-top: 4px;">v2.0.0</div></div>
    </div>

    <!-- two columns: docs / steps -->

      <div class="panel panel-pad" style="padding: 22px 24px;">
        <div class="label">ДОКУМЕНТЫ К ЗАГРУЗКЕ</div>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 14px;">
          <div style="display: flex; gap: 12px; padding: 10px 12px; background: var(--bg-3); border-radius: 6px;"><span class="mono" style="color: var(--fg-3);">01</span><div><div style="font-size: 13px; color: var(--fg-1); font-weight: 500;">Учредительные документы</div><div class="label" style="margin: 0; text-transform: none; letter-spacing: 0;">Шаг 3 · ТОО / АО</div></div></div>

          <div style="display: flex; gap: 12px;"><span class="num" style="width: 26px; height: 26px; border-radius: 50%; background: var(--bg-3); color: var(--fg-3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;">02</span><div style="font-size: 13px; color: var(--fg-1); font-weight: 500;">Параметры лизинга</div></div>
          <div style="display: flex; gap: 12px;"><span class="num" style="width: 26px; height: 26px; border-radius: 50%; background: var(--bg-3); color: var(--fg-3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;">03</span><div style="font-size: 13px; color: var(--fg-1); font-weight: 500;">Документы</div></div>
          <div style="display: flex; gap: 12px;"><span class="num" style="width: 26px; height: 26px; border-radius: 50%; background: var(--bg-3); color: var(--fg-3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;">04</span><div style="font-size: 13px; color: var(--fg-1); font-weight: 500;">Подтверждение</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- 04 APPLY WIZARD -->
<template id="screen-wizard">
<div class="screen" style="flex-direction: row;">
  <!-- LEFT context pane -->
  <div style="width: 40%; min-width: 400px; padding: 40px 44px; background: var(--bg-2); border-right: 1px solid var(--line-2); display: flex; flex-direction: column;">
    <div class="label" style="display: flex; gap: 8px;"><span>SUB-9F4C2A</span><span style="color: var(--fg-5)">·</span><span>v2.0.0</span></div>
    <div class="display" style="font-size: 32px; line-height: 1.05; margin-top: 14px; max-width: 16ch;">Приобретение авиатранспорта и вагонов в лизинг</div>
