<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:18px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .row{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
  .id{font-family:var(--font-mono);font-size:13px;color:var(--fg-2);background:var(--bg-3);padding:5px 10px;border-radius:var(--r-2);border:1px solid var(--line-2)}
  .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:32px;color:var(--fg-1);font-weight:500;letter-spacing:-.01em}
  .sym{font-family:var(--font-mono);font-size:14px;color:var(--accent);padding:0 4px}
</style></head><body><div class="card">
  <div class="label">JETBRAINS MONO · IDS · COORDINATES · NUMERICS</div>
  <div class="row">
    <div class="id"># step_2_leasing</div>
    <div class="id">v2.0.0</div>
    <div class="id">SUB-9F4C2A</div>
    <div class="id">/services/leasing</div>
  </div>
  <div class="row">
    <div class="num">15 000 000 ₸</div>
    <div class="num">12.5%</div>
    <div class="num">+24</div>
  </div>
  <div class="row" style="font-family:var(--font-mono);font-size:13px;color:var(--fg-2)">
    КОНСТРУКТОР<span class="sym">/</span>УСЛУГИ<span class="sym">/</span>ЛИЗИНГ ВАГОНОВ<span class="sym">→</span>ШАГ 02<span class="sym">·</span>v2.0.0<span class="sym">↗</span>
  </div>
</div></body></html>
