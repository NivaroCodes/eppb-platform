<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:36px 40px;display:flex;flex-direction:column;gap:8px}
  .word{font-family:var(--font-display);font-weight:700;font-size:56px;letter-spacing:-.04em;line-height:.95;color:var(--fg-1);display:flex;align-items:center;gap:14px}
  .dot{width:10px;height:10px;background:var(--accent);display:inline-block}
  .sub{font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;color:var(--fg-3);text-transform:uppercase;display:flex;gap:8px;align-items:center;margin-top:6px}
  .sep{color:var(--fg-5)}
</style></head><body><div class="card">
  <div class="word">ЕППБ <span class="dot"></span></div>
  <div class="sub">БАЙТЕРЕК <span class="sep">/</span> HOLDING <span class="sep">/</span> KZ <span class="sep">·</span> v2.0</div>
</div></body></html>
