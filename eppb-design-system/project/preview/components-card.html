<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-4);padding:18px 20px;display:flex;flex-direction:column;gap:8px;max-width:340px}
  .id{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:var(--fg-3)}
  .title{font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-.01em;color:var(--fg-1)}
  .desc{font-size:13px;color:var(--fg-3);line-height:1.5}
  .foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--line-1);font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em}
  .arr{color:var(--accent)}
</style></head><body><div class="card">
  <div class="meta">SERVICE CARD · CATALOG ITEM</div>
  <div class="panel">
    <div class="id">SERVICE · # leasing-aviation-wagons-stage1</div>
    <div class="title">Лизинг авиатранспорта и вагонов</div>
    <div class="desc">Первая ступень заявки. Автозаполнение через eGov, ветвление по форме собственности, расчёт НДС на лету.</div>
    <div class="foot"><span>4 шага · v2.0.0</span><span class="arr">Подробнее →</span></div>
  </div>
</div></body></html>
