<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:0;align-items:stretch;border-radius:var(--r-3);overflow:hidden;border:1px solid var(--line-2)}
  .swatch{flex:1;padding:14px 12px;display:flex;flex-direction:column;justify-content:flex-end;min-height:96px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
  .swatch .name{color:var(--fg-1);font-weight:600;font-size:11px}
  .swatch .hex{color:var(--fg-3);text-transform:uppercase;margin-top:2px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
</style></head><body><div class="card">
  <div class="row">
    <div class="swatch" style="background:#08080a"><div class="name">bg-0</div><div class="hex">#08080A</div></div>
    <div class="swatch" style="background:#0d0d10"><div class="name">bg-1</div><div class="hex">#0D0D10</div></div>
    <div class="swatch" style="background:#131318"><div class="name">bg-2</div><div class="hex">#131318</div></div>
    <div class="swatch" style="background:#1a1a21"><div class="name">bg-3</div><div class="hex">#1A1A21</div></div>
    <div class="swatch" style="background:#23232c"><div class="name">bg-4</div><div class="hex">#23232C</div></div>
    <div class="swatch" style="background:#2c2c37"><div class="name">bg-5</div><div class="hex">#2C2C37</div></div>
  </div>
  <div class="label">VOID · CANVAS · CARD · INPUT · HOVER · ACTIVE</div>
</div></body></html>
