<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .row{display:flex;gap:8px;align-items:flex-end}
  .box{background:var(--bg-3);border:1px dashed var(--line-3);font-family:var(--font-mono);font-size:11px;color:var(--fg-3);display:flex;align-items:center;justify-content:center;border-radius:4px}
</style></head><body><div class="card">
  <div class="meta">SPACING · 4PX BASE</div>
  <div class="row">
    <div class="box" style="width:4px;height:48px"></div>
    <div class="box" style="width:8px;height:48px"></div>
    <div class="box" style="width:12px;height:48px"></div>
    <div class="box" style="width:16px;height:48px"></div>
    <div class="box" style="width:24px;height:48px">24</div>
    <div class="box" style="width:32px;height:48px">32</div>
    <div class="box" style="width:48px;height:48px">48</div>
    <div class="box" style="width:64px;height:48px">64</div>
    <div class="box" style="width:96px;height:48px">96</div>
  </div>
  <div class="meta">RADII</div>
  <div class="row">
    <div class="box" style="width:56px;height:56px;border-radius:4px">4</div>
    <div class="box" style="width:56px;height:56px;border-radius:6px">6</div>
    <div class="box" style="width:56px;height:56px;border-radius:8px">8</div>
    <div class="box" style="width:56px;height:56px;border-radius:12px">12</div>
    <div class="box" style="width:56px;height:56px;border-radius:16px">16</div>
    <div class="box" style="width:56px;height:56px;border-radius:9999px">PILL</div>
  </div>
</div></body></html>
