<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:20px}
  .display{font-family:var(--font-display);font-weight:600;letter-spacing:-0.035em;line-height:.95;color:var(--fg-1);font-size:80px}
  .row{display:flex;align-items:baseline;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .h1{font-family:var(--font-display);font-weight:600;font-size:40px;letter-spacing:-.02em;line-height:1.04}
  .h2{font-family:var(--font-display);font-weight:600;font-size:32px;letter-spacing:-.02em;line-height:1.05}
  .h3{font-family:var(--font-display);font-weight:600;font-size:24px;letter-spacing:-.015em}
</style></head><body><div class="card">
  <div class="meta">SPACE GROTESK · 600 · DISPLAY</div>
  <div class="display">Аа Бб Вв Гг 0123</div>
  <div class="row"><div class="h1">Каталог услуг</div><div class="meta">H1 / 40</div></div>
  <div class="row"><div class="h2">Параметры лизинга</div><div class="meta">H2 / 32</div></div>
  <div class="row"><div class="h3">Сведения о компании</div><div class="meta">H3 / 24</div></div>
</div></body></html>
