<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:baseline}
  .pair{display:flex;flex-direction:column;gap:6px;padding:14px 18px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-3);min-width:140px}
  .sym{font-family:var(--font-mono);font-size:28px;color:var(--accent);line-height:1}
  .lab{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.10em;color:var(--fg-3)}
</style></head><body><div class="card">
  <div class="meta">MONOSPACE SYMBOL SET · IDENTITY LAYER</div>
  <div class="row">
    <div class="pair"><div class="sym">·</div><div class="lab">SEPARATOR</div></div>
    <div class="pair"><div class="sym">→</div><div class="lab">TRANSITION</div></div>
    <div class="pair"><div class="sym">↗</div><div class="lab">EXTERNAL</div></div>
    <div class="pair"><div class="sym">/</div><div class="lab">PATH</div></div>
    <div class="pair"><div class="sym">#</div><div class="lab">ID PREFIX</div></div>
  </div>
</div></body></html>
