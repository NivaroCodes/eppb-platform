<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);color:var(--fg-1);font-family:var(--font-body)}
  .card{padding:32px 36px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .panel{background:var(--bg-2);border:1px solid var(--line-2);border-radius:var(--r-4);padding:20px 22px;width:200px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
  .e1{box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset, 0 1px 2px rgba(0,0,0,.4)}
  .e2{box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset, 0 4px 12px rgba(0,0,0,.32)}
  .e3{box-shadow:0 1px 0 0 rgba(255,255,255,.05) inset, 0 12px 32px rgba(0,0,0,.48)}
  .glow{box-shadow:0 0 0 1px var(--accent-line),0 0 24px rgba(232,75,15,.18)}
</style></head><body><div class="card">
  <div class="meta">ELEVATION · INNER HIGHLIGHT + DROP</div>
  <div class="row">
    <div class="panel e1">SHADOW-1<br>RAISED</div>
    <div class="panel e2">SHADOW-2<br>POPOVER</div>
    <div class="panel e3">SHADOW-3<br>MODAL</div>
    <div class="panel glow" style="border-color:var(--accent-line)">GLOW<br>FOCUSED CTA</div>
  </div>
</div></body></html>
