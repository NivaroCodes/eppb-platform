<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px;min-height:120px;display:flex;flex-direction:column;justify-content:center;gap:16px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .swatch{width:84px;height:84px;border-radius:var(--r-3);border:1px solid var(--line-2);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--fg-2)}
  .swatch .name{color:var(--fg-1);font-weight:600;font-size:11px}
  .swatch .hex{color:var(--fg-3);text-transform:uppercase}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
</style></head><body><div class="card">
  <div class="row">
    <div class="swatch" style="background:#e84b0f"><div class="name">accent</div><div class="hex">#E84B0F</div></div>
    <div class="swatch" style="background:#ff5f25"><div class="name">hover</div><div class="hex">#FF5F25</div></div>
    <div class="swatch" style="background:#c93d08"><div class="name">press</div><div class="hex">#C93D08</div></div>
    <div class="swatch" style="background:rgba(232,75,15,.12);color:#e84b0f"><div class="name" style="color:#e84b0f">soft</div><div class="hex" style="color:#e84b0f">12% A</div></div>
    <div class="swatch" style="background:rgba(232,75,15,.32);color:#ff8a4f"><div class="name" style="color:#ff8a4f">line</div><div class="hex" style="color:#ff8a4f">32% A</div></div>
  </div>
  <div class="label">CTA · ACTIVE · FOCUS · CURRENT STEP — NOTHING ELSE</div>
</div></body></html>
