<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .pill{padding:10px 16px;border-radius:var(--r-pill);font-family:var(--font-mono);font-size:12px;display:flex;align-items:center;gap:8px;border:1px solid}
  .dot{width:8px;height:8px;border-radius:50%}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
</style></head><body><div class="card">
  <div class="row">
    <div class="pill" style="background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.30);color:#4ade80"><div class="dot" style="background:#4ade80"></div>SUCCESS · #4ADE80</div>
    <div class="pill" style="background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.32);color:#f87171"><div class="dot" style="background:#f87171"></div>DANGER · #F87171</div>
    <div class="pill" style="background:rgba(250,204,21,.10);border-color:rgba(250,204,21,.28);color:#facc15"><div class="dot" style="background:#facc15"></div>WARNING · #FACC15</div>
    <div class="pill" style="background:rgba(96,165,250,.10);border-color:rgba(96,165,250,.28);color:#60a5fa"><div class="dot" style="background:#60a5fa"></div>INFO · #60A5FA</div>
  </div>
  <div class="label">SUCCESS — AUTOFILL OK / ACCEPTED · DANGER — VALIDATION ONLY · ROLES NEVER MIX</div>
</div></body></html>
