<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);font-family:var(--font-body);color:var(--fg-1)}
  .card{padding:28px 32px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:0;align-items:stretch;border-radius:var(--r-3);overflow:hidden;border:1px solid var(--line-2)}
  .swatch{flex:1;padding:14px 12px;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end;font-family:var(--font-mono);font-size:10px}
  .name{font-weight:600;font-size:11px}
  .label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
</style></head><body><div class="card">
  <div class="row">
    <div class="swatch" style="background:#0d0d10;color:#f5f5f7"><div class="name">fg-1</div><div>#F5F5F7</div></div>
    <div class="swatch" style="background:#0d0d10;color:#c8c8d0"><div class="name">fg-2</div><div>#C8C8D0</div></div>
    <div class="swatch" style="background:#0d0d10;color:#8e8e9a"><div class="name">fg-3</div><div>#8E8E9A</div></div>
    <div class="swatch" style="background:#0d0d10;color:#5c5c66"><div class="name">fg-4</div><div>#5C5C66</div></div>
    <div class="swatch" style="background:#0d0d10;color:#3a3a44"><div class="name">fg-5</div><div>#3A3A44</div></div>
  </div>
  <div class="label">PRIMARY · SECONDARY · TERTIARY · MUTED · DISABLED</div>
</div></body></html>
