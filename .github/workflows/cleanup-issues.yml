name: Cleanup GitHub Issues
on:
  workflow_dispatch:
  push:
    branches:
      - feature/test

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run cleanup script
        shell: pwsh
        run: |
          ./cleanup_github.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
